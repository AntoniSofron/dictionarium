<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dictionarium — słownik prasłowiański online</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
</script>

<style>
  :root{
    --bg:#0b0f14;
    --card:#121821;
    --muted:#9bb0c8;
    --muted-soft:#9aa6b2;
    --text:#e7eef8;
    --accent:#70c0ff;
    --chip:#1a2330;
    --chip-b:#263244;
    --line:#1f2a3a;
    --btn:#1f3047;
    --btn-h:#2a3f59;
    --tbl:#304767;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font:15px/1.45 system-ui,Segoe UI,Inter,Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  header{
    position:sticky;
    top:0;
    z-index:10;
    backdrop-filter:saturate(1.2) blur(8px);
    background:linear-gradient(180deg, rgba(11,15,20,.92), rgba(11,15,20,.7) 80%, transparent);
    border-bottom:1px solid var(--line);
  }
  .wrap{max-width:1100px; margin:0 auto; padding:14px 16px}
  h1{margin:0 0 6px; font-size:20px; letter-spacing:.2px}
  .row{
    display:grid;
    gap:10px;
    grid-template-columns:1fr 1fr 2fr;
    align-items:center;
  }
  .select,.search{
    background:var(--card);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 12px;
    border-radius:12px;
    outline:none;
  }
  .search{display:flex; align-items:center; gap:8px}
  .search input{all:unset; width:100%; font-size:15px; line-height:22px}
  .hint{font-size:12px; color:var(--muted); margin-top:6px}
  main{padding:12px 16px 60px}
  .status{color:var(--muted); padding:16px}
  .cards{display:flex; flex-direction:column; gap:12px}
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px;
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:14px;
    align-items:start;
  }
  .head{display:flex; flex-direction:column; gap:8px; min-width:0}
  .word{font-size:18px; font-weight:700; word-break:break-word}
  .meta{display:flex; flex-wrap:wrap; gap:6px}
  .chip{
    background:var(--chip);
    border:1px solid var(--chip-b);
    padding:4px 8px;
    border-radius:999px;
    font-size:12px;
    color:var(--muted);
  }
  .actions{display:flex; flex-direction:column; gap:8px; align-items:stretch}
  .action-btn{
    min-width:170px;
    padding:9px 16px;
    border-radius:999px;
    border:1px solid #36527b;
    background:var(--btn);
    color:var(--text);
    font-weight:600;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .action-btn:hover{background:var(--btn-h); transform:translateY(-1px)}
  .action-btn[aria-pressed="true"]{outline:2px solid var(--accent); outline-offset:2px}
  .translations,
  .infl-box{display:none; grid-column:1 / -1}
  .translations.open,
  .infl-box.open{display:block}
  .translations{
    border-top:1px dashed var(--line);
    padding-top:12px;
    margin-top:2px;
  }
  .tl{display:flex; flex-direction:column; gap:8px; font-size:14px}
  .tl .lab{font-weight:700; color:var(--accent)}
  .tl .val{white-space:pre-wrap}
  .infl-box{
    margin-top:2px;
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(15,24,36,.95), rgba(15,24,36,.82));
  }
  .infl-head{
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    font-size:16px;
    font-weight:800;
    text-transform:lowercase;
  }
  .infl-body{padding:12px 16px; overflow:auto}
  .infl-empty{color:var(--muted); font-size:13px}
  .infl-table{
    border-collapse:collapse;
    min-width:520px;
    font-family:"Times New Roman", Georgia, serif;
  }
  .infl-table th,
  .infl-table td{
    border:1px solid var(--tbl);
    padding:8px 10px;
    vertical-align:middle;
  }
  .infl-table thead th{
    font-size:18px;
    font-style:italic;
    font-weight:500;
    text-align:center;
  }
  .infl-table th.case{
    font-size:17px;
    font-style:italic;
    font-weight:400;
    text-align:left;
    white-space:nowrap;
  }
  .infl-table td{min-width:96px}
  .inf-form{color:var(--text)}
  .muted{color:var(--muted-soft)}
  .topbar{
    display:flex;
    gap:8px;
    align-items:center;
    justify-content:space-between;
    margin-top:8px;
  }
  .small{font-size:12px; color:var(--muted)}
  .count{font-variant-numeric:tabular-nums}
  @media (max-width:900px){
    .row{grid-template-columns:1fr 1fr}
    .search{grid-column:1 / -1}
    .card{grid-template-columns:1fr}
    .actions{flex-direction:row; flex-wrap:wrap; justify-content:flex-start}
    .action-btn{min-width:0}
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <h1>Dictionarium — słownik prasłowiański</h1>
    <div class="row">
      <select id="leftLang" class="select" title="Język po lewej (źródłowy)">
        <option value="POL">Polonica</option>
        <option value="CZE">Bohemica</option>
        <option value="RUS">Russica</option>
        <option value="SCL">Slavonica</option>
      </select>

      <select id="rightLang" class="select" title="Język po prawej (docelowy)">
        <option value="SCL">Slavonica</option>
        <option value="POL">Polonica</option>
        <option value="CZE">Bohemica</option>
        <option value="RUS">Russica</option>
      </select>

      <label class="search" title="Szukaj prefiksu w kolumnie źródłowej">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.471 6.471 0 0 0 1.57-4.23C15.99 6.01 13.32 3.34 9.99 3.34S4 6.01 4 9.34s2.67 6 5.99 6c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L20 20.33 21.33 19 15.5 14Zm-5.51 0C7.47 14 6 12.53 6 10.84S7.47 7.68 9.99 7.68s3.99 1.47 3.99 3.16S12.52 14 9.99 14Z"/></svg>
        <input id="query" placeholder="Wpisz początek słowa, np. dom" autocomplete="off" />
      </label>
    </div>
    <div class="hint">Wyniki filtrują się po <em>prefiksie</em> w wybranej kolumnie po lewej. Tłumaczenia oraz tabela fleksyjna są ukryte — otwierasz je oddzielnymi przyciskami w karcie wyniku.</div>
  </div>
</header>

<main class="wrap">
  <div id="status" class="status">Ładowanie danych z PDF…</div>
  <div class="topbar" style="display:none" id="topbar">
    <div class="small"><span class="count" id="countAll">0</span> rekordów wczytano</div>
    <div class="small"><span class="count" id="countShown">0</span> pasujących wyników</div>
  </div>
  <div id="cards" class="cards"></div>
</main>

<script>
(async function(){
  const PDF_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTIzVmMRmSAz-AE8rP_lLJfvHNnVRp5kGQFOCkn9lANWzeEkugCT9LO-JFRDhCLwZgvOuJBnV3shtRV/pub?gid=0&single=true&output=pdf";
  const DEFAULT_FALLBACK = "POL";

  const statusEl = document.getElementById('status');
  const cardsEl  = document.getElementById('cards');
  const topbar   = document.getElementById('topbar');
  const countAll = document.getElementById('countAll');
  const countShown = document.getElementById('countShown');

  const leftSel  = document.getElementById('leftLang');
  const rightSel = document.getElementById('rightLang');
  const queryInp = document.getElementById('query');

  const debounce = (fn, d=200)=>{
    let t;
    return (...args)=>{ clearTimeout(t); t=setTimeout(()=>fn(...args), d); };
  };

  async function loadRecordsFromPdf(){
    statusEl.textContent = "Ładowanie danych z PDF…";
    cardsEl.innerHTML = "";
    topbar.style.display = "none";

    const url = PDF_URL + "&cb=" + Date.now();
    const loadingTask = pdfjsLib.getDocument({ url, cMapPacked: true, useSystemFonts: true });
    const pdf = await loadingTask.promise;

    const columnLabels = ["SCL","I","II","III","IV","V","RUS","POL","CZE"];
    let anchors = null;
    const records = [];

    for(let p=1; p<=pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      const items = content.items.map(it=>{
        const tx = it.transform[4];
        const ty = it.transform[5];
        return {str:(it.str||"").trim(), x:tx, y:ty};
      }).filter(it=>it.str);

      items.sort((a,b)=> b.y - a.y || a.x - b.x);
      const rows = [];
      const tolY = 3.5;
      for(const it of items){
        let row = rows.length ? rows[rows.length-1] : null;
        if(!row || Math.abs(row.y - it.y) > tolY){
          rows.push({ y:it.y, items:[it] });
        }else{
          row.items.push(it);
        }
      }

      for(const row of rows){
        const joined = row.items.map(i=>i.str).join(" ");
        const hasAll = columnLabels.every(lab => joined.includes(lab));
        if(hasAll){
          const found = {};
          for(const lab of columnLabels){
            let cand = row.items.find(i => i.str === lab);
            if(!cand) cand = row.items.find(i => i.str.includes(lab));
            if(cand) found[lab] = cand.x;
          }
          if(Object.keys(found).length >= 7){ anchors = found; }
          break;
        }
      }

      if(!anchors){
        for(const row of rows){
          const txt = row.items.map(i=>i.str);
          const hits = ["RUS","POL","CZE"].filter(x => txt.includes(x)).length;
          if(hits >= 3){
            const found = {};
            for(const lab of columnLabels){
              const cand = row.items.find(i => i.str === lab);
              if(cand) found[lab] = cand.x;
            }
            if(Object.keys(found).length >= 5){ anchors = found; break; }
          }
        }
      }
      if(!anchors) continue;

      const fullOrder = ["SCL","I","II","III","IV","V","RUS","POL","CZE"];
      const present = fullOrder
        .map(lab => ({ lab, x: anchors[lab] }))
        .filter(c => Number.isFinite(c.x))
        .sort((a,b)=> a.x - b.x);

      if(present.length && present.length < fullOrder.length){
        const minX = present[0].x;
        const maxX = present[present.length-1].x;
        const step = (maxX - minX) / (fullOrder.length - 1 || 1);
        const have = new Set(present.map(c=>c.lab));
        for(let i=0;i<fullOrder.length;i++){
          const lab = fullOrder[i];
          if(!have.has(lab)) present.push({ lab, x: minX + step * i });
        }
        present.sort((a,b)=> a.x - b.x);
      }

      const boundaries = [];
      for(let i=0;i<present.length-1;i++){
        boundaries.push((present[i].x + present[i+1].x) / 2);
      }

      function colByX(x){
        for(let i=0;i<present.length;i++){
          const left  = i===0 ? -Infinity : boundaries[i-1];
          const right = i===present.length-1 ? Infinity : boundaries[i];
          if(x >= left && x < right) return present[i].lab;
        }
        return "SCL";
      }

      for(const row of rows){
        const rowText = row.items.map(i=>i.str).join(" ");
        const isHeader = columnLabels.every(l=> rowText.includes(l));
        if(isHeader) continue;

        const rec = {SCL:"", I:"", II:"", III:"", IV:"", V:"", RUS:"", POL:"", CZE:""};
        const buckets = {SCL:[], I:[], II:[], III:[], IV:[], V:[], RUS:[], POL:[], CZE:[]};

        for(const it of row.items){
          const lab = colByX(it.x);
          if(lab) buckets[lab].push(it.str);
        }
        for(const lab of Object.keys(rec)){
          rec[lab] = buckets[lab].join(" ").replace(/\s+/g, " ").trim();
        }

        const nonEmptyCols = Object.values(rec).filter(v=>v).length;
        if(nonEmptyCols >= 2) records.push(rec);
      }
    }

    const key = r => [r.SCL,r.I,r.II,r.III,r.IV,r.V,r.RUS,r.POL,r.CZE].join("¦");
    const uniq = new Map();
    for(const r of records){
      if(!uniq.has(key(r))) uniq.set(key(r), r);
    }
    const final = Array.from(uniq.values());

    countAll.textContent = final.length;
    topbar.style.display = "flex";
    statusEl.textContent = "";
    return final;
  }

  const data = await loadRecordsFromPdf().catch(err=>{
    console.error(err);
    statusEl.innerHTML = "Nie udało się wczytać PDF (CORS / format). Odśwież stronę albo uruchom plik przez http://localhost.";
    return [];
  });

  function normalize(s){ return (s || "").toLowerCase().trim(); }

  function prefixMatch(cell, q){
    if(!cell || !q) return false;
    const parts = cell.split(/[,;|/]/g).map(s=>s.trim()).filter(Boolean);
    if(parts.length === 0) parts.push(cell.trim());
    const qn = normalize(q);
    return parts.some(p => normalize(p).startsWith(qn));
  }

  function posKind(pos){
    const s = (pos || "").toLowerCase().replace(/\s+/g,' ').trim();
    if(/\b(verbum|verb|v\.?)\b/.test(s)) return 'verb';
    if(/\b(adiectiv(?:um|e)?|adjectiv(?:um|e)?|adj\.?)\b/.test(s)) return 'adj';
    return 'other';
  }

  function labelForIV(pos){
    const kind = posKind(pos);
    return kind === 'verb' ? 'aspectus' : (kind === 'adj' ? 'gradus comparativus' : 'genus');
  }

  // Parsowanie V: akceptuje średnik zwykły, pełnoszeroki i warianty, a także łamania linii.
  function parseVParts(v){
    if(!v) return [];
    return String(v)
      .replace(/[\uFF1B\uFE14\uFE54\u061B]/g, ';')
      .replace(/\r\n?/g, '\n')
      .replace(/\n/g, ';')
      .split(';')
      .map(s => s.trim());
  }

  // Mapowanie zgodne z ustaleniem użytkownika:
  // sg = pierwsze 7 segmentów,
  // du = [8. segment => nom/acc/voc, 9. => gen/loc, 10. => dat/ins],
  // pl = [11. => nom/voc, 12-16. => acc,gen,loc,dat,ins].
  function mapVPartsToTable(parts){
    const get = i => parts[i] ?? '';
    return {
      sg: [get(0), get(1), get(2), get(3), get(4), get(5), get(6)],
      duNav: get(7),
      duGl:  get(8),
      duDi:  get(9),
      pl: [get(10), get(11), get(12), get(13), get(14), get(15), get(10)]
    };
  }

  // Renderuje komórkę tak, aby tokeny zaczynające się od * lub † były szare,
  // ale sam znak * / † pozostał widoczny.
  function appendStyledTokens(el, value){
    el.textContent = '';
    if(value == null || value === '') return;

    const pieces = String(value)
      .split(/(\s+|,\s*|\/\s*|\|\s*|\+\s*)/g)
      .filter(part => part !== '');

    for(const part of pieces){
      const isSeparator = /^(\s+|,\s*|\/\s*|\|\s*|\+\s*)$/.test(part);
      if(isSeparator){
        el.appendChild(document.createTextNode(part));
        continue;
      }
      const span = document.createElement('span');
      span.textContent = part;
      if(/^[*†]/.test(part.trimStart())) span.className = 'muted';
      el.appendChild(span);
    }
  }

  function buildInflectionBox(rec){
    const kind = posKind(rec.I);
    const title = kind === 'verb' ? 'coniugatio' : 'declinatio';
    const parts = parseVParts(rec.V);
    const mapped = mapVPartsToTable(parts);
    const rowLabels = ['Nominativus','Accusativus','Genetivus','Locativus','Dativus','Instrumentalis','Vocativus'];

    const box = document.createElement('div');
    box.className = 'infl-box';

    const head = document.createElement('div');
    head.className = 'infl-head';
    head.textContent = title;
    box.appendChild(head);

    const body = document.createElement('div');
    body.className = 'infl-body';

    if(!parts.some(Boolean)){
      const empty = document.createElement('div');
      empty.className = 'infl-empty';
      empty.textContent = 'Brak danych fleksyjnych w kolumnie V.';
      body.appendChild(empty);
      box.appendChild(body);
      return { box, title };
    }

    const table = document.createElement('table');
    table.className = 'infl-table';

    const thead = document.createElement('thead');
    const htr = document.createElement('tr');
    ['', 'Singularis', 'Dualis', 'Pluralis'].forEach((txt, idx)=>{
      const th = document.createElement('th');
      if(idx === 0) th.textContent = '';
      else th.textContent = txt;
      htr.appendChild(th);
    });
    thead.appendChild(htr);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    for(let i=0; i<7; i++){
      const tr = document.createElement('tr');
      const th = document.createElement('th');
      th.className = 'case';
      th.scope = 'row';
      th.textContent = rowLabels[i];
      tr.appendChild(th);

      const tdSg = document.createElement('td');
      tdSg.className = 'inf-form';
      appendStyledTokens(tdSg, mapped.sg[i]);
      tr.appendChild(tdSg);

      // Dualis ma grupy wspólnych form: nom/acc, gen/loc, dat/ins, a voc = nom.
      if(i === 0){
        const tdDu = document.createElement('td');
        tdDu.className = 'inf-form';
        tdDu.rowSpan = 2;
        appendStyledTokens(tdDu, mapped.duNav);
        tr.appendChild(tdDu);
      }
      if(i === 2){
        const tdDu = document.createElement('td');
        tdDu.className = 'inf-form';
        tdDu.rowSpan = 2;
        appendStyledTokens(tdDu, mapped.duGl);
        tr.appendChild(tdDu);
      }
      if(i === 4){
        const tdDu = document.createElement('td');
        tdDu.className = 'inf-form';
        tdDu.rowSpan = 2;
        appendStyledTokens(tdDu, mapped.duDi);
        tr.appendChild(tdDu);
      }
      if(i === 6){
        const tdDu = document.createElement('td');
        tdDu.className = 'inf-form';
        appendStyledTokens(tdDu, mapped.duNav);
        tr.appendChild(tdDu);
      }

      const tdPl = document.createElement('td');
      tdPl.className = 'inf-form';
      appendStyledTokens(tdPl, mapped.pl[i]);
      tr.appendChild(tdPl);

      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    body.appendChild(table);
    box.appendChild(body);
    return { box, title };
  }

  function render(){
    const left = leftSel.value;
    const right = rightSel.value;
    const q = queryInp.value.trim();

    let rows = data;
    if(q) rows = rows.filter(r => prefixMatch(r[left], q));

    cardsEl.innerHTML = '';
    countShown.textContent = rows.length;

    if(!q){
      if(data.length){
        statusEl.innerHTML = 'Wpisz w polu wyszukiwania, np. <b>dom</b>. Ustaw po lewej <b>Polonica</b>, po prawej <b>Slavonica</b>.';
      }
      return;
    }
    statusEl.textContent = '';

    rows = rows.slice().sort((a,b)=> (a[right] || '').localeCompare(b[right] || ''));

    for(const r of rows){
      const card = document.createElement('div');
      card.className = 'card';

      const head = document.createElement('div');
      head.className = 'head';

      const word = document.createElement('div');
      word.className = 'word';
      word.textContent = (r[right] || '(brak)').trim();
      head.appendChild(word);

      const meta = document.createElement('div');
      meta.className = 'meta';
      const chips = [
        { lab:'pars orationis',        val:r.I,  raw:false },
        { lab:'paradigma accentualia', val:r.II, raw:false },
        { lab:'exemplum',              val:r.III,raw:false },
        { lab:labelForIV(r.I),         val:r.IV, raw:false },
        { lab:'',                      val:r.V,  raw:true  }
      ];
      for(const it of chips){
        if(!it.val) continue;
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = it.raw ? it.val : `${it.lab}: ${it.val}`;
        meta.appendChild(chip);
      }
      head.appendChild(meta);

      const actions = document.createElement('div');
      actions.className = 'actions';

      const btnTrans = document.createElement('button');
      btnTrans.className = 'action-btn';
      btnTrans.type = 'button';
      btnTrans.textContent = 'translationes';
      btnTrans.setAttribute('aria-pressed', 'false');
      btnTrans.title = 'Pokaż lub ukryj tłumaczenia';

      const kind = posKind(r.I);
      const inflLabel = kind === 'verb' ? 'coniugatio' : 'declinatio';
      const btnInfl = document.createElement('button');
      btnInfl.className = 'action-btn';
      btnInfl.type = 'button';
      btnInfl.textContent = inflLabel;
      btnInfl.setAttribute('aria-pressed', 'false');
      btnInfl.title = 'Pokaż lub ukryj tabelę fleksyjną';

      actions.appendChild(btnTrans);
      actions.appendChild(btnInfl);

      const trans = document.createElement('div');
      trans.className = 'translations';
      const tl = document.createElement('div');
      tl.className = 'tl';
      [
        ['Polonica', r.POL],
        ['Bohemica', r.CZE],
        ['Russica',  r.RUS]
      ].forEach(([lab, val])=>{
        const wrap = document.createElement('div');
        const L = document.createElement('div');
        L.className = 'lab';
        L.textContent = lab;
        const V = document.createElement('div');
        V.className = 'val';
        V.textContent = val || '—';
        wrap.appendChild(L);
        wrap.appendChild(V);
        tl.appendChild(wrap);
      });
      trans.appendChild(tl);

      const infl = buildInflectionBox(r);

      btnTrans.addEventListener('click', ()=>{
        const open = trans.classList.toggle('open');
        btnTrans.setAttribute('aria-pressed', open ? 'true' : 'false');
      });

      btnInfl.addEventListener('click', ()=>{
        const open = infl.box.classList.toggle('open');
        btnInfl.setAttribute('aria-pressed', open ? 'true' : 'false');
      });

      card.appendChild(head);
      card.appendChild(actions);
      card.appendChild(trans);
      card.appendChild(infl.box);
      cardsEl.appendChild(card);
    }
  }

  let lastLeft = leftSel.value;
  let lastRight = rightSel.value;

  function enforceSlavonica(trigger){
    const prevLeft = lastLeft;
    const prevRight = lastRight;

    if(trigger === 'left'){
      if(leftSel.value === 'SCL' && rightSel.value === 'SCL'){
        rightSel.value = prevLeft && prevLeft !== 'SCL' ? prevLeft : DEFAULT_FALLBACK;
      }else if(leftSel.value !== 'SCL' && rightSel.value !== 'SCL'){
        rightSel.value = 'SCL';
      }
    }else if(trigger === 'right'){
      if(leftSel.value === 'SCL' && rightSel.value === 'SCL'){
        leftSel.value = prevRight && prevRight !== 'SCL' ? prevRight : DEFAULT_FALLBACK;
      }else if(leftSel.value !== 'SCL' && rightSel.value !== 'SCL'){
        leftSel.value = 'SCL';
      }
    }

    lastLeft = leftSel.value;
    lastRight = rightSel.value;
    render();
  }

  leftSel.addEventListener('change', ()=> enforceSlavonica('left'));
  rightSel.addEventListener('change', ()=> enforceSlavonica('right'));
  queryInp.addEventListener('input', debounce(render, 120));

  lastLeft = leftSel.value;
  lastRight = rightSel.value;
  if(data.length){
    statusEl.innerHTML = 'Wpisz w polu wyszukiwania, np. <b>dom</b>. Ustaw po lewej <b>Polonica</b>, po prawej <b>Slavonica</b>.';
  }
})();
</script>
</body>
</html>
