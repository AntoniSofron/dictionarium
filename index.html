<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dictionarium Sanctae Marthae</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
  :root{
    --bg:#0b0f14; --card:#121821; --muted:#9bb0c8; --text:#e7eef8; --accent:#70c0ff;
    --chip:#1a2330; --chip-b:#263244; --line:#1f2a3a; --pill:#1b2839; --pill-b:#2a3b55;
    --panel:#111824; --panel-head:#0f1520;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{ margin:0; background:var(--bg); color:var(--text); font:15px/1.45 system-ui,Segoe UI,Inter,Roboto,Arial,sans-serif; }
  header{ position:sticky; top:0; z-index:5; backdrop-filter:saturate(1.1) blur(8px);
    background:linear-gradient(180deg, rgba(11,15,20,.9), rgba(11,15,20,.6) 80%, transparent);
    border-bottom:1px solid var(--line); }
  .wrap{max-width:1100px; margin:0 auto; padding:14px 16px}
  .brand{ display:grid; grid-template-columns:auto 1fr; gap:14px; align-items:center; }
  .logo img{ height:96px; width:auto; display:block; user-select:none; pointer-events:none; }
  h1{margin:0 0 6px; font-size:20px; letter-spacing:.2px}
  .row{ display:grid; gap:10px; grid-template-columns: 1fr 1fr 2fr; align-items:center; }
  .select, .search{ background:var(--card); border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:12px; outline:none; }
  .search{display:flex; align-items:center; gap:8px}
  .search input{ all:unset; width:100%; font-size:15px; line-height:22px; }
  .hint{font-size:12px; color:var(--muted); margin-top:6px}
  main{padding:12px 16px 90px}
  .status{color:var(--muted); padding:16px}
  .topbar{ display:flex; gap:8px; align-items:center; justify-content:space-between; margin-top:8px; }
  .small{ font-size:12px; color:var(--muted) } .count{ font-variant-numeric: tabular-nums; }
  .cards{display:flex; flex-direction:column; gap:10px}
  .card{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px;
    display:grid; grid-template-columns: 1fr auto; gap:12px; align-items:start; }
  .head{ display:flex; flex-direction:column; gap:6px; min-width:0; }
  .word{ font-size:18px; font-weight:600; word-break:break-word; display:flex; align-items:baseline; flex-wrap:wrap; gap:6px; }
  .bracket{ color:var(--muted); font-weight:400; }

  /* 1.5× względem .word (18px -> 27px) */
  .chandzi{
    font-weight:800;
    font-size:27px;
    line-height:1.15;
    margin-top:2px;
    margin-bottom:4px;
    letter-spacing:.2px;
  }

  .meta{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ background:var(--chip); border:1px solid var(--chip-b); padding:4px 8px; border-radius:999px; font-size:12px; color:var(--muted); }

  .btn-col{ display:flex; flex-direction:column; gap:8px; align-items:stretch; min-width:170px; }
  .pill-btn{ appearance:none; border:1px solid var(--pill-b); background:var(--pill); color:var(--text);
    padding:9px 14px; border-radius:999px; cursor:pointer; font-weight:700; letter-spacing:.2px;
    transition:filter .15s ease, transform .06s ease, box-shadow .15s ease; }
  .pill-btn:hover{ filter:brightness(1.08) } .pill-btn[aria-pressed="true"]{ outline:2px solid var(--accent); outline-offset:2px; }

  .xlat-panel, .morph-panel, .sig-panel{ display:none; background:var(--panel); border:1px solid var(--line); border-radius:14px; margin-top:8px; }
  .xlat-panel.open, .morph-panel.open, .sig-panel.open{ display:block; }
  .x-head, .m-head, .s-head{ padding:14px 18px; background:linear-gradient(180deg, var(--panel-head), rgba(255,255,255,0.04));
    border-bottom:1px solid var(--line); border-radius:14px 14px 0 0; font-weight:800; letter-spacing:.2px; font-size:19px; text-transform:lowercase; }
  .x-body, .m-body, .s-body{ padding:12px 14px; }
  .xlat-item{ display:grid; grid-template-columns: 160px 1fr; gap:12px; padding:6px 0; align-items:start; }
  .xlat-item + .xlat-item{ border-top:1px dashed var(--line); }
  .lab{ font-weight:700; color:var(--accent) }

  .morph-table{
    display:inline-table; width:max-content; table-layout:auto;
    border-collapse:separate; border-spacing:0; font-size:15px; margin:0 2px;
  }
  .morph-table th, .morph-table td{
    border:1px solid #2b3a52; padding:6px 8px; vertical-align:middle; min-height:28px; white-space:nowrap;
  }
  .morph-table th{ text-align:center; background:#0f1520; color:var(--text); }
  .morph-table td{ background:#141b26; color:var(--text); }
  .morph-table .cases{ font-style:italic; color:#ffffff; }

  .sig-text{ white-space:pre-wrap; line-height:1.55; }

  footer{ position:fixed; left:0; right:0; bottom:0; background:linear-gradient(180deg, rgba(11,15,20,0), rgba(11,15,20,.9));
    border-top:1px solid var(--line); text-align:center; font-style:italic; color:var(--muted); padding:10px 16px; }
  @media (max-width:900px){ .row{ grid-template-columns: 1fr 1fr } .search{ grid-column: 1 / -1 } .logo img{height:72px} }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand">
      <div class="logo"><img src="image.png" alt="Logo"></div>
      <div>
        <h1>Dictionarium Sanctae Marthae</h1>
        <div class="row">
          <select id="leftLang" class="select">
            <option value="SLA">Slavonica</option>
            <option value="LSA">Lingua Slavonica Antiqua</option>
            <option value="RUS">Russica</option>
            <option value="ALB">Albaruthenica</option>
            <option value="UCR">Ucrainica</option>
            <option value="POL" selected>Polonica</option>
            <option value="SSU">Sorabica Superior</option>
            <option value="SIN">Sorabica Inferior</option>
            <option value="SLO">Slovaca</option>
            <option value="BOH">Bohemica</option>
            <option value="SLV">Slovena</option>
            <option value="CRO">Croatica</option>
            <option value="SER">Serbica</option>
            <option value="MAC">Macedonica</option>
            <option value="BUL">Bulgarica</option>
          </select>

          <select id="rightLang" class="select">
            <option value="SLA" selected>Slavonica</option>
            <option value="LSA">Lingua Slavonica Antiqua</option>
            <option value="RUS">Russica</option>
            <option value="ALB">Albaruthenica</option>
            <option value="UCR">Ucrainica</option>
            <option value="POL">Polonica</option>
            <option value="SSU">Sorabica Superior</option>
            <option value="SIN">Sorabica Inferior</option>
            <option value="SLO">Slovaca</option>
            <option value="BOH">Bohemica</option>
            <option value="SLV">Slovena</option>
            <option value="CRO">Croatica</option>
            <option value="SER">Serbica</option>
            <option value="MAC">Macedonica</option>
            <option value="BUL">Bulgarica</option>
          </select>

          <label class="search">
            <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.471 6.471 0 0 0 1.57-4.23C15.99 6.01 13.32 3.34 9.99 3.34S4 6.01 4 9.34s2.67 6 5.99 6c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L20 20.33 21.33 19 15.5 14Zm-5.51 0C7.47 14 6 12.53 6 10.84S7.47 7.68 9.99 7.68s3.99 1.47 3.99 3.16S12.52 14 9.99 14Z"/></svg>
            <input id="query" placeholder="Scribe initium verbi" autocomplete="off" />
          </label>
        </div>
      </div>
    </div>
    <div class="hint">Translationes recentiores sub puga “translationes” praesto sunt.</div>
  </div>
</header>

<main class="wrap">
  <div id="status" class="status">Ładowanie danych…</div>
  <div class="topbar" id="topbar" style="display:none">
    <div class="small">numerus verborum totus: <span class="count" id="countAll">0</span></div>
    <div class="small">numerus verborum quaesitorum: <span class="count" id="countShown">0</span></div>
  </div>
  <div class="cards" id="cards"></div>
</main>

<footer>
  <div class="wrap">Auctor huius dictionarii Antonius Sofronus est.</div>
</footer>

<script>
(async function(){
  const XLSX_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQZoAolAWEBzbwXjPzA67tmva1TyOR2AYB-49vqXPo98MXodomWq2dGKGewO_z8-iZIYbr0x6Z5jbPP/pub?output=xlsx";

  const leftSel  = document.getElementById('leftLang');
  const rightSel = document.getElementById('rightLang');
  const queryInp = document.getElementById('query');
  const statusEl = document.getElementById('status');
  const cardsEl  = document.getElementById('cards');
  const topbar   = document.getElementById('topbar');
  const countAll = document.getElementById('countAll');
  const countShown = document.getElementById('countShown');

  const DEFAULT_FALLBACK = "POL";

  function debounce(fn, d=150){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), d); } }
  function normalize(s){ return (s||"").toLowerCase().trim(); }
  function prefixMatch(cell,q){
    if(!cell||!q) return false;
    return normalize(cell).split(/[,;/|]/).some(p=>p.trim().startsWith(normalize(q)));
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  function isVerbPOS(pos){ return /\b(verbum|vb\.?|v\.?)\b/i.test(pos||""); }
  function isAdjPOS(pos){ return /\b(adiectiv|adjectiv|adj\.?)\b/i.test(pos||""); }
  function isNounPOS(pos){ return /\b(nomen|nom\.?|n\.?)\b/i.test(pos||""); }
  function isPronPOS(pos){ return /\b(pronomen|pron\.?)\b/i.test(pos||""); }

  function aspectOnly(iv){
    const m=(iv||"").match(/\b(impf\.?|perf\.?)\b/i);
    if(!m) return "";
    return m[1].toLowerCase().startsWith('impf')?'impf.':'perf.';
  }

  function parseV(vStr, len){
    const parts = String(vStr||"").split(";").map(s=>s.trim());
    const out = new Array(len).fill("—");
    for(let i=0;i<Math.min(parts.length,len);i++){ out[i] = parts[i] || "—"; }
    return out;
  }

  function buildNounLikeTable(vStr){
    const v = parseV(vStr, 16);
    const cases = ["Nominativus","Accusativus","Genetivus","Locativus","Dativus","Instrumentalis","Vocativus"];
    const table = document.createElement('table'); table.className='morph-table';
    const thead = document.createElement('thead');
    thead.innerHTML = `<tr><th class="cases"> </th><th>Singularis</th><th>Dualis</th><th>Pluralis</th></tr>`;
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const S = [0,1,2,3,4,5,6];
    const Dn = v[7], Dgl = v[8], Ddi = v[9];
    const P = [10,11,12,13,14,15,10];

    cases.forEach((c, i)=>{
      const tr = document.createElement('tr');
      tr.appendChild(tdLabel(c));
      tr.appendChild(td(v[S[i]]));
      if(i===0){ const t=td(Dn); t.rowSpan=2; tr.appendChild(t); }
      else if(i===2){ const t=td(Dgl); t.rowSpan=2; tr.appendChild(t); }
      else if(i===4){ const t=td(Ddi); t.rowSpan=2; tr.appendChild(t); }
      else if(i===6){ tr.appendChild(td(Dn)); }
      tr.appendChild(td(v[P[i]]));
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    return table;

    function tdLabel(txt){ const x=document.createElement('td'); x.className='cases'; x.textContent=txt; return x; }
    function td(val){ const x=document.createElement('td'); x.textContent=val && val.length?val:'—'; return x; }
  }

  function buildAdjTable(vStr){
    const v = parseV(vStr, 25);
    const g = i => v[i-1] || '—';

    const table = document.createElement('table'); table.className='morph-table';
    const tbody = document.createElement('tbody');

    tbody.appendChild(rowHead(['Indefinitum','Adverbium','Comparativus','Superlativus']));
    { const tr=document.createElement('tr'); tr.append(td(g(1)), td(g(2)), td(g(3)), td(g(4))); tbody.appendChild(tr); }

    tbody.appendChild(sectionRow('Singularis',5));
    tbody.appendChild(rowHead(['','Masculinum anim.','Masculinum','Neutrum','Femininum'], true));
    { const tr=document.createElement('tr'); tr.append(tdLabel('Nominativus'));
      const left=document.createElement('td'); left.colSpan=2; left.textContent=g(5); tr.appendChild(left);
      tr.append(td(g(10)), td(g(11))); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Accusativus'));
      tr.append(td(g(6)), td(g(5)), td(g(10)), td(g(12))); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Genetivus'));
      const left=document.createElement('td'); left.colSpan=3; left.textContent=g(6); tr.appendChild(left);
      tr.append(td(g(13))); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Locativus'));
      const left=document.createElement('td'); left.colSpan=3; left.textContent=g(7); tr.appendChild(left);
      tr.append(td(g(14))); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Dativus'));
      const left=document.createElement('td'); left.colSpan=3; left.textContent=g(8); tr.appendChild(left);
      tr.append(td(g(14))); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Instrumentalis'));
      const left=document.createElement('td'); left.colSpan=3; left.textContent=g(9); tr.appendChild(left);
      tr.append(td(g(15))); tbody.appendChild(tr); }

    tbody.appendChild(sectionRow('Dualis',5));
    tbody.appendChild(rowHead(['','Masculinum anim.','Masculinum','Neutrum','Femininum'], true));
    { const tr=document.createElement('tr'); tr.append(tdLabel('Nom., Acc.'));
      const a=document.createElement('td'); a.colSpan=2; a.textContent=g(16); tr.appendChild(a);
      const b=document.createElement('td'); b.colSpan=2; b.textContent=g(19); tr.appendChild(b); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Gen., Loc.'));
      const one=document.createElement('td'); one.colSpan=4; one.textContent=g(17); tr.appendChild(one); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Dat., Instr.'));
      const one=document.createElement('td'); one.colSpan=4; one.textContent=g(18); tr.appendChild(one); tbody.appendChild(tr); }

    tbody.appendChild(sectionRow('Pluralis',5));
    tbody.appendChild(rowHead(['','Masculinum anim.','Masculinum','Neutrum','Femininum'], true));
    { const tr=document.createElement('tr'); tr.append(tdLabel('Nominativus'));
      tr.append(td(g(20)), td(g(21)), td(g(25)), td(g(21))); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Accusativus'));
      const left=document.createElement('td'); left.colSpan=2; left.textContent=g(21); tr.appendChild(left);
      tr.append(td(g(25)), td(g(21))); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Genetivus'));
      const one=document.createElement('td'); one.colSpan=4; one.textContent=g(22); tr.appendChild(one); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Locativus'));
      const one=document.createElement('td'); one.colSpan=4; one.textContent=g(22); tr.appendChild(one); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Dativus'));
      const one=document.createElement('td'); one.colSpan=4; one.textContent=g(23); tr.appendChild(one); tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLabel('Instrumentalis'));
      const one=document.createElement('td'); one.colSpan=4; one.textContent=g(24); tr.appendChild(one); tbody.appendChild(tr); }

    table.appendChild(tbody);
    return table;

    function tdLabel(txt){ const x=document.createElement('td'); x.className='cases'; x.textContent=txt; return x; }
    function td(val){ const x=document.createElement('td'); x.textContent=val && val.length?val:'—'; return x; }
    function sectionRow(t, span){ const tr=document.createElement('tr'); const th=document.createElement('th'); th.textContent=t; th.colSpan=span; tr.appendChild(th); return tr; }
    function rowHead(labels, firstIsCases=false){ const tr=document.createElement('tr'); labels.forEach((lab,i)=>{ const th=document.createElement('th'); th.textContent = firstIsCases&&i===0?' ':lab; if(firstIsCases&&i===0) th.className='cases'; tr.appendChild(th); }); return tr; }
  }

  function buildVerbTable(aspectStr, vStr){
    const isImpf = /\bimpf\.?\b/i.test(aspectStr||"");
    const base = parseV(vStr, 30);
    const v = isImpf ? base : ["", ...base];

    const table = document.createElement('table'); table.className='morph-table';
    const thead = document.createElement('thead');
    const topCols = isImpf ? ['Incipere','Infinitivus','Supinum','Nomen verbi'] : ['', 'Infinitivus','Supinum','Nomen verbi'];
    thead.appendChild(rowFrom(topCols, 'th'));
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    const slots=[];

    { const tr = document.createElement('tr');
      const t0=document.createElement('td'), t1=document.createElement('td'),
            t2=document.createElement('td'), t3=document.createElement('td');
      tr.append(t0,t1,t2,t3); tbody.appendChild(tr);
      slots.push(t0,t1,t2,t3); }

    tbody.appendChild(sectionHeaderRow('Participia', 3));
    { const tr=document.createElement('tr');
      const thEmpty=document.createElement('th'); thEmpty.className='cases'; thEmpty.textContent=' '; tr.appendChild(thEmpty);
      const th1=document.createElement('th'); th1.textContent='Praeteritum'; tr.appendChild(th1);
      const th2=document.createElement('th'); th2.textContent=isImpf?'Praesens':'Futurum'; tr.appendChild(th2);
      tbody.appendChild(tr); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Perfectivum')); const t=document.createElement('td'); t.colSpan=2; tr.appendChild(t); tbody.appendChild(tr); slots.push(t); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Activum')); const a=document.createElement('td'), b=document.createElement('td'); tr.append(a,b); tbody.appendChild(tr); slots.push(a,b); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Passivum')); const a=document.createElement('td'), b=document.createElement('td'); tr.append(a,b); tbody.appendChild(tr); slots.push(a,b); }

    tbody.appendChild(sectionHeaderRow('Praesens', 4));
    tbody.appendChild(rowFrom(['','Persona prima','Persona secunda','Persona tertia'], 'th', true));
    { const tr=document.createElement('tr'); tr.append(tdLab('Singularis'), td(), td(), td()); tbody.appendChild(tr); slots.push(tr.children[1],tr.children[2],tr.children[3]); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Dualis'), td(), td(2)); tbody.appendChild(tr); slots.push(tr.children[1],tr.children[2]); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Pluralis'), td(), td(), td()); tbody.appendChild(tr); slots.push(tr.children[1],tr.children[2],tr.children[3]); }

    const tenseBlock = isImpf ? 'Imperfectum' : 'Aoristus';
    tbody.appendChild(sectionHeaderRow(tenseBlock, 4));
    tbody.appendChild(rowFrom(['','Persona prima','Persona secunda','Persona tertia'], 'th', true));
    { const tr=document.createElement('tr'); tr.append(tdLab('Singularis'), td(), td(), td()); tbody.appendChild(tr); slots.push(tr.children[1],tr.children[2],tr.children[3]); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Dualis'), td(), td(2)); tbody.appendChild(tr); slots.push(tr.children[1],tr.children[2]); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Pluralis'), td(), td(), td()); tbody.appendChild(tr); slots.push(tr.children[1],tr.children[2],tr.children[3]); }

    tbody.appendChild(sectionHeaderRow('Imperativus', 4));
    tbody.appendChild(rowFrom(['','Persona prima','Persona secunda','Persona tertia'], 'th', true));
    { const tr=document.createElement('tr'); tr.append(tdLab('Singularis'), td(), td(2)); tbody.appendChild(tr); slots.push(tr.children[2]); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Dualis'), td(), td(), td()); tbody.appendChild(tr); slots.push(tr.children[1],tr.children[2]); }
    { const tr=document.createElement('tr'); tr.append(tdLab('Pluralis'), td(), td(), td()); tbody.appendChild(tr); slots.push(tr.children[1],tr.children[2]); }

    table.appendChild(tbody);
    slots.forEach((cell, i)=>{ cell.textContent = v[i] || (i===0 ? "" : "—"); });
    return table;

    function sectionHeaderRow(title, span){ const tr=document.createElement('tr'); const th=document.createElement('th'); th.textContent=title; th.colSpan=span; tr.appendChild(th); return tr; }
    function rowFrom(labels, tag='td', italicFirst=false){ const tr=document.createElement('tr'); labels.forEach((lab,i)=>{ const el=document.createElement(tag); if(italicFirst && i===0){ el.className='cases'; el.textContent=' '; } else el.textContent=lab; tr.appendChild(el); }); return tr; }
    function td(colSpan=1){ const x=document.createElement('td'); if(colSpan>1) x.colSpan=colSpan; return x; }
    function tdLab(txt){ const x=document.createElement('td'); x.textContent=txt; x.className='cases'; return x; }
  }

  async function loadXLSX(){
    statusEl.textContent = "Ładowanie danych z XLSX…";
    const buf = await fetch(XLSX_URL, {cache: "no-store"}).then(r=>r.arrayBuffer());
    const wb  = XLSX.read(new Uint8Array(buf), { type: "array" });
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:"", raw:true });

    const normKey = k => (k||"").toString().trim().toUpperCase();

    const out=[];
    for(const r of rows){
      const rec = {};
      for(const k of Object.keys(r)){ rec[normKey(k)] = (r[k] ?? "").toString().trim(); }

      const row = {};
      row["CHANDZI"] = rec["CHANDZI"] || rec["CHANDŽI"] || rec["CHANDŽĬ"] || rec["CHANDŽÍ"] || "";
      const restCols = ["SLA","PSL","0","I","II","III","IV","V","VI","LSA","RUS","ALB","UCR","POL","SSU","SIN","SLO","BOH","SLV","CRO","SER","MAC","BUL"];
      restCols.forEach(c=>row[c]=rec[c]||"");

      if(Object.keys(row).some(k=>row[k])) out.push(row);
    }

    countAll.textContent = out.length;
    topbar.style.display = "flex";
    statusEl.textContent = "";
    return out;
  }

  const data = await loadXLSX().catch(e=>{ console.error(e); statusEl.textContent="Nie udało się wczytać XLSX."; return []; });

  let lastLeft = leftSel.value, lastRight = rightSel.value;
  function enforceSlavonica(trigger){
    const prevLeft = lastLeft, prevRight = lastRight;

    if(trigger === 'left'){
      if(rightSel.value === 'SLA' && leftSel.value === 'SLA'){
        rightSel.value = prevLeft && prevLeft !== 'SLA' ? prevLeft : DEFAULT_FALLBACK;
      } else if(leftSel.value !== 'SLA' && rightSel.value !== 'SLA'){
        rightSel.value = 'SLA';
      }
    } else {
      if(leftSel.value === 'SLA' && rightSel.value === 'SLA'){
        leftSel.value = prevRight && prevRight !== 'SLA' ? prevRight : DEFAULT_FALLBACK;
      } else if(leftSel.value !== 'SLA' && rightSel.value !== 'SLA'){
        leftSel.value = 'SLA';
      }
    }

    lastLeft = leftSel.value; lastRight = rightSel.value;
    closePanels(); render();
  }

  function closePanels(){
    document.querySelectorAll('.xlat-panel.open, .morph-panel.open, .sig-panel.open').forEach(p=>p.classList.remove('open'));
    document.querySelectorAll('.pill-btn[aria-pressed="true"]').forEach(b=>b.setAttribute('aria-pressed','false'));
  }

  function render(){
    const L = leftSel.value, R = rightSel.value, q = queryInp.value.trim();
    let rows = data;

    if(q) rows = rows.filter(r => prefixMatch(r[L], q));

    cardsEl.innerHTML = "";
    countShown.textContent = rows.length;

    if(!q){
      statusEl.textContent = "Eventus scribentur in lingua, quae a dextra parte selecta erit. Intra in campo quaestionis verbum, ut quaerere incipias.";
      return;
    }
    statusEl.textContent = "";

    rows.forEach(r=>{
      const card = document.createElement('div'); card.className='card';
      const head = document.createElement('div'); head.className='head';

      const word = document.createElement('div'); word.className='word';
      const lemma = (r[R]||"(brak)").trim();
      word.append(document.createTextNode(lemma));
      if(r["0"]){
        const br=document.createElement('span'); br.className='bracket'; br.textContent=`[${r["0"]}]`;
        word.append(br);
      }
      head.appendChild(word);

      const ch = (r.CHANDZI||"").trim();
      if(ch){
        const chEl = document.createElement('div');
        chEl.className = 'chandzi';
        chEl.textContent = ch;
        head.appendChild(chEl);
      }

      const meta = document.createElement('div'); meta.className='meta';
      const pos = (r.I||"");
      const chips = [
        ["pars orationis", r.I],
        ["paradigma accentualia", r.II],
        ["exemplum", r.III],
        [ isVerbPOS(pos) ? "aspectus" : (isAdjPOS(pos) ? "gradus comparativus" : "genus"), isVerbPOS(pos) ? aspectOnly(r.IV) : r.IV ]
      ];
      chips.forEach(([lab,val])=>{
        if(!val) return;
        const s=document.createElement('span'); s.className='chip'; s.textContent = `${lab}: ${val}`;
        meta.appendChild(s);
      });
      head.appendChild(meta);

      const btnCol=document.createElement('div'); btnCol.className='btn-col';

      const bT=document.createElement('button');
      bT.className='pill-btn'; bT.textContent='translationes';
      bT.setAttribute('aria-pressed','false');
      btnCol.appendChild(bT);

      const bS=document.createElement('button');
      bS.className='pill-btn'; bS.textContent='significatio';
      bS.setAttribute('aria-pressed','false');
      btnCol.appendChild(bS);

      const allowMorph = isNounPOS(pos) || isPronPOS(pos) || isAdjPOS(pos) || isVerbPOS(pos);
      let bM=null, mPanel=null;
      if(allowMorph){
        bM=document.createElement('button');
        bM.className='pill-btn';
        bM.textContent = isVerbPOS(pos) ? 'coniugatio' : 'declinatio';
        bM.setAttribute('aria-pressed','false');
        btnCol.appendChild(bM);

        mPanel=document.createElement('div');
        mPanel.className='morph-panel';
        const mHead=document.createElement('div'); mHead.className='m-head';
        mHead.textContent = isVerbPOS(pos) ? 'coniugatio' : 'declinatio';
        const mBody=document.createElement('div'); mBody.className='m-body';

        const table = isVerbPOS(pos) ? buildVerbTable(aspectOnly(r.IV), r.V)
                                     : (isAdjPOS(pos) ? buildAdjTable(r.V) : buildNounLikeTable(r.V));

        mBody.appendChild(table);
        mPanel.appendChild(mHead); mPanel.appendChild(mBody);
      }

      card.appendChild(head);
      card.appendChild(btnCol);
      cardsEl.appendChild(card);

      const x = document.createElement('div'); x.className='xlat-panel';
      x.innerHTML = `
        <div class="x-head">translationes</div>
        <div class="x-body">
          ${langRow('Slavonica', r.SLA)}
          ${langRow('Protoslavica', r.PSL)}
          ${langRow('Lingua Slavonica Antiqua', r.LSA)}
          ${langRow('Russica', r.RUS)}
          ${langRow('Albaruthenica', r.ALB)}
          ${langRow('Ucrainica', r.UCR)}
          ${langRow('Polonica', r.POL)}
          ${langRow('Sorabica Superior', r.SSU)}
          ${langRow('Sorabica Inferior', r.SIN)}
          ${langRow('Slovaca', r.SLO)}
          ${langRow('Bohemica', r.BOH)}
          ${langRow('Slovena', r.SLV)}
          ${langRow('Croatica', r.CRO)}
          ${langRow('Serbica', r.SER)}
          ${langRow('Macedonica', r.MAC)}
          ${langRow('Bulgarica', r.BUL)}
        </div>`;
      cardsEl.appendChild(x);

      const sP = document.createElement('div'); sP.className='sig-panel';
      sP.innerHTML = `
        <div class="s-head">significatio</div>
        <div class="s-body"><div class="sig-text">${escapeHtml((r.VI||"—").trim() || "—")}</div></div>
      `;
      cardsEl.appendChild(sP);

      if(mPanel) cardsEl.appendChild(mPanel);

      bT.addEventListener('click', ()=>{
        const open = !x.classList.contains('open');
        closePanels();
        if(open){
          x.classList.add('open');
          bT.setAttribute('aria-pressed','true');
          x.scrollIntoView({behavior:'smooth', block:'nearest'});
        }
      });

      bS.addEventListener('click', ()=>{
        const open = !sP.classList.contains('open');
        closePanels();
        if(open){
          sP.classList.add('open');
          bS.setAttribute('aria-pressed','true');
          sP.scrollIntoView({behavior:'smooth', block:'nearest'});
        }
      });

      if(bM){
        bM.addEventListener('click', ()=>{
          const open = !mPanel.classList.contains('open');
          closePanels();
          if(open){
            mPanel.classList.add('open');
            bM.setAttribute('aria-pressed','true');
            mPanel.scrollIntoView({behavior:'smooth', block:'nearest'});
          }
        });
      }

      function langRow(name, val){
        const v = (val && String(val).trim().length) ? String(val).trim() : "—";
        return `<div class="xlat-item"><div class="lab">${name}</div><div class="val">${escapeHtml(v)}</div></div>`;
      }
    });
  }

  leftSel.addEventListener('change', ()=>enforceSlavonica('left'));
  rightSel.addEventListener('change', ()=>enforceSlavonica('right'));
  queryInp.addEventListener('input', debounce(()=>{ closePanels(); render(); },120));

  if(data.length){
    statusEl.textContent = "Eventus scribentur in lingua, quae a dextra parte selecta erit. Intra in campo quaestionis verbum, ut quaerere incipias.";
  }
})();
</script>
</body>
</html>
